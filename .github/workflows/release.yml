name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release"
        required: true
        type: string

permissions:
  contents: write

env:
  APP_NAME: webmediautil

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-amd64
            runner: windows-latest
            goos: windows
            goarch: amd64
            target: windows-amd64
          - label: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            target: linux-amd64
          - label: macos-arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
            target: macos-arm64

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build binary
        id: build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          out="release-assets/${APP_NAME}-${{ matrix.target }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            out="${out}.exe"
          fi

          VERSION="${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}"
          LDFLAGS="-s -w"
          if [ -n "${VERSION}" ]; then
            LDFLAGS="${LDFLAGS} -X main.Version=${VERSION}"
          fi
          if [ "${{ matrix.goos }}" = "windows" ]; then
            LDFLAGS="${LDFLAGS} -H=windowsgui"
          fi

          CGO_ENABLED=0 GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" \
            go build -trimpath -ldflags="${LDFLAGS}" -o "${out}" .

          echo "artifact_path=${out}" >> "${GITHUB_OUTPUT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.target }}
          path: ${{ steps.build.outputs.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: ${{ env.APP_NAME }}-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}
          name: ${{ env.APP_NAME }} ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}
          files: release-assets/*
          generate_release_notes: true
